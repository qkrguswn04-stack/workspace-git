{% extends "base.html" %}
{% block title %}Open Love Letter {% endblock %}
{% block head %}
<link rel="stylesheet" href="../static/css/style.css">
{% endblock %}
{% block content %}
<div class="relative z-10 flex items-center justify-center min-h-screen py-10 px-4">
    <div id="card"
        class="bg-white/90 backdrop-blur-md rounded-2xl shadow-xl hover:shadow-2xl transition-shadow duration-300 overflow-hidden w-full max-w-[420px]">
        <img src="../static/img/1.webp" alt="card" class="w-full h-48 object-cover object-top filter brightness-105">
        <div class="p-8">
            <h1 id="h1" class="text-3xl text-pink-500 font-extrabold text-center mb-6 tracking-tight">Open Love Letter
                💌</h1>
            <form id="cardForm" action="/get_card" method="post" class="space-y-4">
                <div>
                    <input type="text" id="toNm" name="toNm"
                        class="w-full px-4 py-3 bg-pink-50/50 rounded-xl border border-pink-200 focus:outline-none focus:ring-2 focus:ring-pink-400 focus:border-transparent transition-all placeholder-gray-400 font-medium text-gray-700"
                        placeholder="받는 분 이름">
                </div>
                <div>
                    <input type="email" id="email" name="email"
                        class="w-full px-4 py-3 bg-pink-50/50 rounded-xl border border-pink-200 focus:outline-none focus:ring-2 focus:ring-pink-400 focus:border-transparent transition-all placeholder-gray-400 font-medium text-gray-700"
                        placeholder="수신 이메일">
                </div>
                <button type="submit" id="btn"
                    class="w-full bg-pink-500 hover:bg-pink-600 text-white font-bold py-3.5 mt-2 rounded-xl shadow-lg hover:shadow-pink-500/40 transition-all transform hover:-translate-y-0.5 active:translate-y-0">편지
                    열어보기 💖</button>
            </form>
            <!-- 에러 메시지 렌더링 -->
            {% if error %}
            <div class="mt-4 bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-xl shadow-sm animate-pulse flex items-center gap-2"
                role="alert">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd"
                        d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                        clip-rule="evenodd"></path>
                </svg>
                <span class="text-sm font-medium">{{ error }}</span>
            </div>
            {% endif %}
            <a href="/form"
                class="mt-6 block text-center text-sm font-semibold text-gray-400 hover:text-pink-500 underline underline-offset-4 transition-colors">새로운
                편지 쓰기</a>
        </div>
    </div>
</div>
{% endblock %}
