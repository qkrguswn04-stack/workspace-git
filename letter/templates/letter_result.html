{% extends "base.html" %}

{% block title %}Love Letter Received {% endblock %}

{% block head %}
<link rel="stylesheet" href="../static/css/result.css">
<style>
  body {
    text-align: center;
  }

  /* 엽서 중앙 정렬을 위한 보조 */
</style>
{% endblock %}

{% block content %}
<div class="relative z-10 flex flex-col items-center justify-center min-h-screen">
  <!-- 숨겨진 배경 음악 플레이어 -->
  <audio id="bgm" loop>
    <source src="../static/audio/Sakura-Romance_Royalty-Free-Music.mp3" type="audio/mp3">
  </audio>

  <div class="card my-12 mx-auto rounded-xl shadow-2xl shadow-pink-200" style="border: none;">
    <div class="card-page cart-page-front rounded-xl">
      <div class="card-page cart-page-outside rounded-xl"></div>
      <!-- 카드 표면 (Tailwind 플렉스로 중앙정렬) -->
      <div class="card-page cart-page-inside rounded-r-xl bg-pink-50 flex items-center justify-center">
        <span class="love-letter-title font-extrabold text-3xl text-pink-500 text-center drop-shadow-md pb-12">
          <p>For You 💌</p>
        </span>
      </div>
    </div>

    <!-- 카드 밑면 (열렸을 때 보이는 내부) -->
    <div class="card-page cart-page-bottom rounded-l-xl bg-white shadow-inner flex flex-col justify-center px-10">
      <!-- 하드코딩 문구를 제거하고 백엔드 파이썬 DB에서 넘어온 데이터(Jinja2) 주입 -->
      <div id="letter" class="w-full text-gray-800 opacity-90 p-8 font-serif font-medium text-lg leading-relaxed"
        data-message1="{{ message1 }}" data-message2="{{ message2 }}" data-message3="{{ message3 }}">
        <!-- 1,2,3줄 통일된 폰트 -->
        <h1 class="mb-3"><span id="typing-text1"></span></h1>
        <h1 class="mb-3"><span id="typing-text2"></span></h1>
        <h1 class="mb-3"><span id="typing-text3"></span></h1>
      </div>
    </div>
  </div>

  <!-- 아이콘 애니메이션을 Tailwind 커스텀 바운스로 변경 -->
  <span
    class="click-icon fixed bottom-10 left-1/2 transform -translate-x-1/2 w-10 h-10 cursor-pointer animate-bounce hover:scale-110 transition-transform">
    <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
      <path fill="#ff6b81"
        d="M31.6 17.7V26c0 1.9-.7 3.7-2 5.1v.9c0 1.6-1.3 3-3 3h-8.4c-1.6 0-3-1.3-3-3 0-.6.5-1 1-1s1 .4 1 1c0 .5.4 1 1 1h8.4c.5 0 1-.4 1-1v-1.2-.3-.1c0-.1.1-.2.2-.3 1.1-1.1 1.7-2.5 1.7-4v-8.3c0-.3-.1-.5-.3-.7-.1-.1-.5-.4-1-.3-.4.1-.8.6-.8 1.1v2.4c0 .6-.5 1-1 1s-1-.4-1-1v-5.5c0-.3-.1-.5-.3-.7s-.4-.3-.7-.3c-.5 0-1 .5-1 1v5.5c0 .6-.5 1-1 1s-1-.4-1-1v-8.5c0-.3-.1-.5-.3-.7s-.4-.3-.7-.3c-.5 0-1 .5-1 1v8.5c0 .6-.5 1-1 1s-1-.4-1-1V7.7c0-.3-.1-.5-.3-.7-.1-.1-.5-.4-1-.3-.4.1-.8.6-.8 1.1V20c0 .4-.2.8-.6.9-.4.2-.8.1-1.1-.2L11 18.1c-.6-.6-1.6-.6-2.2.1-.5.6-.4 1.5.2 2.1l7 7c.4.4.4 1 0 1.4-.2.2-.5.3-.7.3-.3 0-.5-.1-.7-.3l-7-7.1c-1.3-1.3-1.5-3.5-.3-4.8C8 16 9 15.5 10 15.5c.9 0 1.8.4 2.5 1l.9.9V7.9c0-1.4.9-2.7 2.3-3 1-.3 2.1 0 2.8.8.6.6.9 1.3.9 2.1V9c.3-.1.7-.2 1-.2.8 0 1.5.3 2.1.9s.9 1.3.9 2.1v.2c.3-.1.7-.2 1-.2.8 0 1.5.3 2.1.9s.9 1.3.9 2.1v.2c.1 0 .2-.1.3-.1 1-.3 2.1 0 2.8.8.8.5 1.1 1.3 1.1 2z" />
    </svg>
  </span>
  <!-- 이 페이지에서만 구동되는 애니메이션 JS -->
  <script src="../static/js/style.js"></script>
  <!-- 브라우저 정책 우회 (카드를 누르는 순간 배경음악 터지게 만듦) -->
  <script>
    document.body.addEventListener("click", function () {
      let bgm = document.getElementById("bgm");
      if (bgm && bgm.paused) {
        bgm.play();
      }
    }, { once: true });
  </script>
</div>
{% endblock %}
